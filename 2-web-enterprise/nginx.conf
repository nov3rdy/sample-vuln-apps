server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # V12: Security Misconfiguration — no CSP, HSTS, X-Content-Type-Options
    # V19: Clickjacking — no X-Frame-Options or CSP frame-ancestors directive
    # (deliberately omitted — default response headers only)

    client_max_body_size 16M;

    # V12: Security Misconfiguration — uploads directory is autoindexed
    location /uploads/ {
        autoindex on;
        autoindex_exact_size off;
        # V9 + V12: any file extension is served as-is, including .php uploaded by attackers,
        # because we route .php under /uploads/ to PHP-FPM as well.
        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # Front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
